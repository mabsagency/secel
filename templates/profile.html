{% extends 'base.html' %}
{% block title %}Mon Profil — SECEL{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:700px">
  <div class="card-secel p-4 p-md-5">
    <div class="d-flex align-items-center gap-3 mb-4">
      <div class="teacher-avatar-lg">{{ (current_user.full_name or current_user.username)[0].upper() }}</div>
      <div>
        <h4 class="mb-0">{{ current_user.full_name or current_user.username }}</h4>
        <span class="role-badge role-{{ current_user.role }}">{{ current_user.role | title }}</span>
      </div>
    </div>
    <form method="POST" action="{{ url_for('profile') }}">
      <div class="row g-3">
        <div class="col-md-6">
          <div class="form-group-secel">
            <label class="form-label-secel">Nom complet</label>
            <div class="input-icon-wrap">
              <i class="fas fa-user input-icon"></i>
              <input type="text" name="full_name" class="input-secel" value="{{ current_user.full_name or '' }}"/>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group-secel">
            <label class="form-label-secel">Téléphone</label>
            <div class="input-icon-wrap">
              <i class="fas fa-phone input-icon"></i>
              <input type="text" name="phone" class="input-secel" value="{{ current_user.phone or '' }}"/>
            </div>
          </div>
        </div>
        <div class="col-12">
          <div class="form-group-secel">
            <label class="form-label-secel">Email</label>
            <div class="input-icon-wrap">
              <i class="fas fa-envelope input-icon"></i>
              <input type="email" class="input-secel" value="{{ current_user.email }}" disabled/>
            </div>
          </div>
        </div>
        <div class="col-12">
          <div class="form-group-secel">
            <label class="form-label-secel">Bio</label>
            <textarea name="bio" class="input-secel" rows="3" placeholder="Parlez de vous...">{{ current_user.bio or '' }}</textarea>
          </div>
        </div>
        <div class="col-12"><hr class="border-secondary my-2"/></div>
        <div class="col-md-6">
          <div class="form-group-secel">
            <label class="form-label-secel">Nouveau mot de passe</label>
            <div class="input-icon-wrap">
              <i class="fas fa-lock input-icon"></i>
              <input type="password" name="new_password" class="input-secel" placeholder="Laisser vide pour ne pas changer"/>
            </div>
          </div>
        </div>
      </div>
      <button type="submit" class="btn-auth-submit mt-4 w-100"><i class="fas fa-save me-2"></i>Sauvegarder les modifications</button>
    </form>
  </div>
</div>
{% endblock %}
